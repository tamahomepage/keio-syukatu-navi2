// カテゴリ一覧を生成
const categories = [...new Set(GLOSSARY.map(t => t.category))];
let activeCategory = '';

function renderCategoryTabs() {
  const el = document.getElementById('category-tabs');
  el.innerHTML = `<button class="cat-tab ${!activeCategory ? 'active' : ''}" onclick="setCategory('')">すべて</button>` +
    categories.map(c =>
      `<button class="cat-tab ${activeCategory === c ? 'active' : ''}" onclick="setCategory('${c}')">${c}</button>`
    ).join('');
}

function setCategory(cat) {
  activeCategory = cat;
  renderCategoryTabs();
  filterTerms();
}

function filterTerms() {
  const query = document.getElementById('search').value.trim().toLowerCase();
  const filtered = GLOSSARY.filter(t => {
    if (activeCategory && t.category !== activeCategory) return false;
    if (!query) return true;
    return t.term.toLowerCase().includes(query)
      || (t.reading && t.reading.toLowerCase().includes(query))
      || (t.fullName && t.fullName.toLowerCase().includes(query))
      || t.desc.toLowerCase().includes(query);
  });

  document.getElementById('search-count').textContent = `${filtered.length}件の用語`;
  renderGlossary(filtered);
}

function renderGlossary(terms) {
  const el = document.getElementById('glossary-content');
  if (!terms.length) {
    el.innerHTML = '<div class="no-results">該当する用語が見つかりませんでした。</div>';
    return;
  }

  // カテゴリ別にグループ化
  const groups = {};
  terms.forEach(t => {
    if (!groups[t.category]) groups[t.category] = [];
    groups[t.category].push(t);
  });

  el.innerHTML = Object.keys(groups).map(cat => {
    const items = groups[cat].map(t => {
      const fullNameStr = t.fullName ? `（${t.fullName}）` : '';
      const relatedHtml = t.related && t.related.length
        ? `<div class="related">関連: ${t.related.map(r => `<a onclick="jumpToTerm('${r}')">${r}</a>`).join('、')}</div>`
        : '';
      const exampleHtml = t.example
        ? `<div class="example">${t.example}</div>` : '';

      return `<div class="term-card" id="term-${encodeURIComponent(t.term)}">
        <div class="term-header" onclick="this.parentElement.classList.toggle('open')">
          <div>
            <span class="term-name">${t.term}</span>
            <span class="term-reading">${t.reading || ''}${fullNameStr}</span>
          </div>
          <div style="display:flex;align-items:center;gap:0.5rem;">
            <span class="term-cat-badge">${t.category}</span>
            <span class="term-arrow">&#9654;</span>
          </div>
        </div>
        <div class="term-body">
          ${t.desc}
          ${exampleHtml}
          ${relatedHtml}
        </div>
      </div>`;
    }).join('');

    return `<div class="glossary-group">
      <div class="group-title">${cat}</div>
      ${items}
    </div>`;
  }).join('');
}

function jumpToTerm(termName) {
  // 検索をリセットしてすべて表示
  document.getElementById('search').value = '';
  activeCategory = '';
  renderCategoryTabs();
  filterTerms();

  // スクロール＆開く
  setTimeout(() => {
    const el = document.getElementById('term-' + encodeURIComponent(termName));
    if (el) {
      el.classList.add('open');
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      el.style.borderColor = 'var(--gold)';
      setTimeout(() => { el.style.borderColor = ''; }, 2000);
    }
  }, 100);
}

// 初期表示
renderCategoryTabs();
filterTerms();
