var activeCategory = '';

function renderCategoryTabs() {
  var categories = [];
  TEMPLATES.forEach(function(t) {
    if (categories.indexOf(t.category) === -1) categories.push(t.category);
  });
  var el = document.getElementById('category-tabs');
  el.innerHTML = '<button class="cat-tab ' + (!activeCategory ? 'active' : '') + '" onclick="setCategory(\'\')">すべて</button>' +
    categories.map(function(c) {
      return '<button class="cat-tab ' + (activeCategory === c ? 'active' : '') + '" onclick="setCategory(\'' + c + '\')">' + c + '</button>';
    }).join('');
}

function setCategory(cat) {
  activeCategory = cat;
  renderCategoryTabs();
  filterTemplates();
}

function filterTemplates() {
  var query = document.getElementById('search').value.trim().toLowerCase();
  var filtered = TEMPLATES.filter(function(t) {
    if (activeCategory && t.category !== activeCategory) return false;
    if (!query) return true;
    return t.title.toLowerCase().indexOf(query) !== -1
      || t.category.toLowerCase().indexOf(query) !== -1
      || t.template.toLowerCase().indexOf(query) !== -1
      || t.tips.toLowerCase().indexOf(query) !== -1;
  });

  document.getElementById('search-count').textContent = filtered.length + '件のテンプレート';
  renderTemplates(filtered);
}

function escapeHtml(str) {
  return str.replace(/\x3c/g, '&lt;').replace(/>/g, '&gt;').replace(/&(?!lt;|gt;|amp;|quot;)/g, '&amp;');
}

function highlightPlaceholders(str) {
  var escaped = escapeHtml(str);
  return escaped.replace(/\[([^\]]+)\]/g, '<span class="placeholder">[$1]</span>');
}

function renderTemplates(templates) {
  var el = document.getElementById('templates-content');
  if (!templates.length) {
    el.innerHTML = '<div class="no-results">該当するテンプレートが見つかりませんでした。</div>';
    return;
  }

  var groups = {};
  templates.forEach(function(t) {
    if (!groups[t.category]) groups[t.category] = [];
    groups[t.category].push(t);
  });

  var idx = 0;
  el.innerHTML = Object.keys(groups).map(function(cat) {
    var items = groups[cat].map(function(t) {
      var currentIdx = idx++;
      var shareText = '就活メールテンプレート: ' + t.title + ' #就活';
      var escapedShareText = shareText.replace(/'/g, "\\'");
      var escapedCopyTitle = t.title.replace(/'/g, "\\'");
      return '<div class="term-card" id="template-' + currentIdx + '">' +
        '<button class="share-btn" onclick="event.stopPropagation();toggleShareDropdown(this)" title="シェア">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>' +
        '</button>' +
        '<div class="share-dropdown">' +
          '<button class="share-option" onclick="event.stopPropagation();shareToX(\'' + escapedShareText + '\')">' +
            '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>' +
            ' X (Twitter)' +
          '</button>' +
          '<button class="share-option" onclick="event.stopPropagation();shareToLine(\'' + escapedShareText + '\')">' +
            '<svg viewBox="0 0 24 24" fill="#06C755"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63h2.386c.346 0 .627.285.627.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63.346 0 .628.285.628.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.282.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>' +

          '</button>' +

            ' コピー' +
          '</button>' +
        '</div>' +
        '<div class="term-header" onclick="this.parentElement.classList.toggle(\'open\')">' +
          '<div><span class="term-name">' + escapeHtml(t.title) + '</span></div>' +
          '<div style="display:flex;align-items:center;gap:0.5rem;">' +
            '<span class="term-cat-badge">' + escapeHtml(t.category) + '</span>' +
            '<span class="term-arrow">&#9654;</span>' +
          '</div>' +
        '</div>' +
        '<div class="term-body">' +
          '<div class="template-text">' + highlightPlaceholders(t.template) + '</div>' +
          '<button class="copy-btn" onclick="copyTemplate(' + currentIdx + ', this, event)">' +
            '&#128203; コピー' +
          '</button>' +
          '<div class="tips"><div class="tips-label">&#128161; 使い方のコツ</div>' + escapeHtml(t.tips) + '</div>' +
        '</div>' +
      '</div>';
    }).join('');

    return '<div class="glossary-group">' +
      '<div class="group-title">' + escapeHtml(cat) + '</div>' +
      items +
    '</div>';
  }).join('');
}

function copyTemplate(idx, btn, event) {
  event.stopPropagation();
  var allTemplates = [];
  var groups = {};
  TEMPLATES.forEach(function(t) {
    if (!groups[t.category]) groups[t.category] = [];
    groups[t.category].push(t);
  });
  Object.keys(groups).forEach(function(cat) {
    groups[cat].forEach(function(t) {
      allTemplates.push(t);
    });
  });

  var filtered = [];
  var query = document.getElementById('search').value.trim().toLowerCase();
  TEMPLATES.forEach(function(t) {
    if (activeCategory && t.category !== activeCategory) return;
    if (!query) { filtered.push(t); return; }
    if (t.title.toLowerCase().indexOf(query) !== -1
      || t.category.toLowerCase().indexOf(query) !== -1
      || t.template.toLowerCase().indexOf(query) !== -1
      || t.tips.toLowerCase().indexOf(query) !== -1) {
      filtered.push(t);
    }
  });

  var orderedTemplates = [];
  var oGroups = {};
  filtered.forEach(function(t) {
    if (!oGroups[t.category]) oGroups[t.category] = [];
    oGroups[t.category].push(t);
  });
  Object.keys(oGroups).forEach(function(cat) {
    oGroups[cat].forEach(function(t) {
      orderedTemplates.push(t);
    });
  });

  if (idx >= 0 && idx < orderedTemplates.length) {
    var text = orderedTemplates[idx].template;
    navigator.clipboard.writeText(text).then(function() {
      btn.innerHTML = '&#10003; コピーしました';
      btn.classList.add('copied');
      setTimeout(function() {
        btn.innerHTML = '&#128203; コピー';
        btn.classList.remove('copied');
      }, 2000);
    });
  }
}

// --- SNS Share Functions ---
function toggleShareDropdown(btn) {
  var dropdown = btn.nextElementSibling;
  var isOpen = dropdown.classList.contains('open');
  closeAllShareDropdowns();
  if (!isOpen) dropdown.classList.add('open');
}
function closeAllShareDropdowns() {
  document.querySelectorAll('.share-dropdown.open').forEach(function(d) { d.classList.remove('open'); });
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.share-btn') && !e.target.closest('.share-dropdown')) {
    closeAllShareDropdowns();
  }
});
function shareToX(text) {
  var url = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(text) + '&url=' + encodeURIComponent(location.href);
  window.open(url, '_blank', 'width=550,height=420');
  closeAllShareDropdowns();
}
function shareToLine(text) {
  var url = 'https://social-plugins.line.me/lineit/share?url=' + encodeURIComponent(location.href) + '&text=' + encodeURIComponent(text);
  window.open(url, '_blank', 'width=550,height=420');
  closeAllShareDropdowns();
}
function copyToClipboard(text, btn) {
  navigator.clipboard.writeText(text).then(function() {
    btn.classList.add('copied-feedback');
    var origHTML = btn.innerHTML;
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="#2e7d32" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> コピーしました';
    setTimeout(function() {
      btn.innerHTML = origHTML;
      btn.classList.remove('copied-feedback');
    }, 2000);
  });
  closeAllShareDropdowns();
}
function copyTemplateToClipboard(idx, btn) {
  var orderedTemplates = getOrderedTemplates();
  if (idx >= 0 && idx < orderedTemplates.length) {
    copyToClipboard(orderedTemplates[idx].template, btn);
  }
}
function getOrderedTemplates() {
  var filtered = [];
  var query = document.getElementById('search').value.trim().toLowerCase();
  TEMPLATES.forEach(function(t) {
    if (activeCategory && t.category !== activeCategory) return;
    if (!query) { filtered.push(t); return; }
    if (t.title.toLowerCase().indexOf(query) !== -1
      || t.category.toLowerCase().indexOf(query) !== -1
      || t.template.toLowerCase().indexOf(query) !== -1
      || t.tips.toLowerCase().indexOf(query) !== -1) {
      filtered.push(t);
    }
  });
  var ordered = [];
  var oGroups = {};
  filtered.forEach(function(t) {
    if (!oGroups[t.category]) oGroups[t.category] = [];
    oGroups[t.category].push(t);
  });
  Object.keys(oGroups).forEach(function(cat) {
    oGroups[cat].forEach(function(t) { ordered.push(t); });
  });
  return ordered;
}

// 初期表示
renderCategoryTabs();
filterTemplates();
